kind = "web"
previewPath = "/"
title = "GlowPolls - Tenri Schools Embu"
version = "1.0.0"
id = "artifacts/glowpolls"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25742

[services.development]
run = "pnpm --filter @workspace/glowpolls run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/glowpolls", "run", "build" ]
publicDir = "artifacts/glowpolls/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25742"
BASE_PATH = "/"
